name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          VITE_CLIENT_SECRET: ${{ secrets.VITE_CLIENT_SECRET }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Install webOS CLI
        run: npm install -g @webos-tools/cli

      - name: Package IPK
        run: ares-package dist -o .

      - name: Generate manifest
        run: |
          IPK_FILE=$(ls *.ipk)
          VERSION=${GITHUB_REF_NAME#v}
          SHA256=$(sha256sum "$IPK_FILE" | cut -d' ' -f1)
          cat > com.kpuppy.app.manifest.json << EOF
          {
            "id": "com.kpuppy.app",
            "version": "$VERSION",
            "type": "web",
            "title": "KPuppy",
            "appDescription": "A lightweight webOS LG TV app for KinoPub online cinema.",
            "iconUri": "https://raw.githubusercontent.com/twttr/KPuppy/develop/webos-meta/icon.png",
            "sourceUrl": "https://github.com/twttr/KPuppy",
            "rootRequired": false,
            "ipkUrl": "$IPK_FILE",
            "ipkHash": {
              "sha256": "$SHA256"
            }
          }
          EOF

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kpuppy-${{ github.ref_name }}
          path: '*.ipk'

      - name: Upload icons artifact
        uses: actions/upload-artifact@v4
        with:
          name: icons
          path: |
            dist/icon.png
            dist/largeIcon.png
          include-hidden-files: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.ipk
            com.kpuppy.app.manifest.json
          generate_release_notes: true

  update-homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download IPK artifact
        uses: actions/download-artifact@v4
        with:
          name: kpuppy-${{ github.ref_name }}
          path: ./ipk

      - name: Download icons artifact
        uses: actions/download-artifact@v4
        with:
          name: icons
          path: ./icons

      - name: Checkout homebrew repo
        uses: actions/checkout@v4
        with:
          repository: twttr/webos-apps
          token: ${{ secrets.HOMEBREW_PAT }}
          path: homebrew

      - name: Update KPuppy app
        run: |
          rm -f homebrew/apps/com.kpuppy.app/*.ipk
          cp ipk/*.ipk homebrew/apps/com.kpuppy.app/
          cp icons/icon.png homebrew/apps/com.kpuppy.app/
          cp icons/largeIcon.png homebrew/apps/com.kpuppy.app/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate manifest
        run: node scripts/generate-manifest.js
        working-directory: homebrew

      - name: Commit and push
        run: |
          cd homebrew
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update KPuppy to ${{ github.ref_name }}"
          git push
